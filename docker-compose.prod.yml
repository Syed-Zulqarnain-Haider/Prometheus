services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_HOST_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Firebase Admin (token verification) and the BigQuery reader are SEPARATE
      # service-account identities — never the same key. Both are mounted files under
      # ./secrets (read-only); only their PATHS are set here. The BigQuery key is OPTIONAL:
      # if ./secrets/bq-reader.json is absent the Integration tab simply reports "not
      # configured" and the sync stays off — the dashboard still runs.
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase-admin.json
      BQ_CREDENTIALS_PATH: /secrets/bq-reader.json
    volumes:
      # Mount the whole secrets DIR (read-only) so the optional BQ key can be absent
      # without breaking container startup (a per-file bind of a missing file would).
      - ./secrets:/secrets:ro
    ports:
      - "127.0.0.1:8000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
