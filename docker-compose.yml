# Local development dependencies only (Postgres + Redis).
# Production uses Cloud SQL (private IP) and Memorystore — never this compose file.
# Bring up:   docker compose up -d
# Then:       cd backend && alembic upgrade head

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: prometheus
      POSTGRES_PASSWORD: prometheus
      POSTGRES_DB: prometheus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prometheus -d prometheus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
