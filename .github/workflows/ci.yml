name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: prometheus
          POSTGRES_PASSWORD: prometheus
          POSTGRES_DB: prometheus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prometheus -d prometheus_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Test harness (tests/conftest.py) reads these; point them at the services.
      TEST_DATABASE_URL: postgresql+asyncpg://prometheus:prometheus@localhost:5432/prometheus_test
      REDIS_TEST_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install ".[dev]"
      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict)
        run: mypy app
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend (lint + tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build-time placeholder; the real value is set in Vercel (see DEPLOY.md).
      NEXT_PUBLIC_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
