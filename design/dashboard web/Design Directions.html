<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terafort — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Spectral:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #0f1115; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="scripts/dir-charts.js"></script>
<script src="scripts/directions.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;
  const W = 980, H = 560;

  function Board({ html }) {
    const ref = React.useRef(null);
    useEffect(() => { if (ref.current) ref.current.innerHTML = html; }, [html]);
    return <div ref={ref} style={{ width: "100%", height: "100%" }} />;
  }

  function App() {
    const D = window.DIRECTIONS;
    return (
      <DesignCanvas>
        <DCSection id="directions" title="CEO Command Center — Design Directions"
          subtitle="Four aesthetics, same data. Sharp corners throughout. Pick one (or mix) and I'll rebuild the full dashboard in it.">
          <DCArtboard id="a" label="A · Swiss Ledger  (light · editorial)" width={W} height={H}><Board html={D.A()} /></DCArtboard>
          <DCArtboard id="b" label="B · Electric  (light · bold SaaS)" width={W} height={H}><Board html={D.B()} /></DCArtboard>
          <DCArtboard id="c" label="C · Warm Luxe  (dark · gold serif)" width={W} height={H}><Board html={D.C()} /></DCArtboard>
          <DCArtboard id="d" label="D · Terminal  (dark · mono technical)" width={W} height={H}><Board html={D.D()} /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
